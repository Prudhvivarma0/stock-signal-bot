version: "3.9"

services:
  stock-bot:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - ./signals.db:/app/signals.db
      - ./portfolio.json:/app/portfolio.json
      - ./logs:/app/logs
    env_file:
      - .env
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
